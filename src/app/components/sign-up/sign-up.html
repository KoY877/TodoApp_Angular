<p>sign-up works!</p>
<div class="container-fluid">
    <div class="row">
        <div class="col-lg-12 col-md-12 flex align-items" >
            <div class="sign-up-container">
                <h2>Sign Up</h2>
                <form [formGroup]="form" (ngSubmit)="handleSignUpSubmit($event)">
                  <div *ngIf="errorMessage" class="alert alert-danger">
                    {{ errorMessage }}
                  </div>
                  <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" class="form-control" formControlName="username" name="username" required>
                  </div>
                  <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" class="form-control" formControlName="email" name="email" required>
                  </div>
                  <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" class="form-control" formControlName="password" name="password" required>
                  </div>
                  <div class="flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <button type="button" class="btn btn-secondary" (click)="handleSignUpRedirect()">Sign In</button>
                  </div>
                </form>
            </div>
        </div>
    </div>
</div>
